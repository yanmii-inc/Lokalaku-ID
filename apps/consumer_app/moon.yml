$schema: 'https://moonrepo.dev/schemas/project.json'
language: 'dart'

tasks:
  init:
    command: 'bash'
    args:
      - '-c'
      - 'echo ''{"env":"3.44.0"}'' > .puro.json && puro use 3.44.0 && puro flutter create --platforms android,ios . && puro flutter pub get && puro flutter pub run slang && bash ../../scripts/merge-launch-configs.sh $MOON_PROJECT_ROOT'
    options:
      runInCI: false
      cache: false
    description: 'Pin Flutter version, scaffold native platforms, and merge launch configs'

  build:
    command: 'puro flutter build apk'
    inputs:
      - 'lib/**/*.dart'
      - 'pubspec.yaml'

  test:
    command: 'puro flutter test'
    inputs:
      - 'test/**/*.dart'
      - 'lib/**/*.dart'

  gen:
    command: 'bash'
    args:
      - '-c'
      - 'puro flutter pub get && puro flutter pub run slang'
    description: 'Fetch packages and run Slang generation'

