name: lokalaku_domain
description: >
  Pure Dart domain entities and value objects for the Lokalaku platform.
  No Flutter, no network, no storage. Depends on nothing internal.
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  lints: ^4.0.0
